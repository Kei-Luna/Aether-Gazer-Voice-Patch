[Voice]
; Master switch for the patch.
Enabled=1

; Write a log file (AetherGazer-VoicePatch.log) next to the DLL.
Log=1

; Allocate a console window (useful while debugging).
Console=0

; Log every resource download URL the game requests (even ones we do NOT
; redirect). Use this on the first run to discover the exact voice *file* URL
; pattern, then add a matching token below.
LogAllDownloads=1

; Also redirect raw UnityWebRequest URLs (e.g. voice_package_list_*).
HookUnityWebRequest=1

; The path segment that identifies the PC resource branch, and what it is
; replaced with (the mobile/android branch). Host stays the same official CDN.
FromSegment=/pc/resources/
ToSegment=/android/resources/

; Primary discriminator. Cached downloads (DownloadManager.StartDownloadWithCache)
; expose their destination path: voice goes to ...\Voice\<lang>\..., assets go to
; ...\Windows\... . Any cache download whose localPath contains this marker is
; redirected. This covers the voice hash manifest AND every voice .ys file
; (which share <md5>.ys naming with asset bundles and are otherwise
; indistinguishable by URL). Leave empty to disable.
PathMarker=voice

; Fallback discriminator for downloads without a localPath (e.g. the raw
; UnityWebRequest that fetches voice_package_list_*). A URL is redirected when it
; contains FromSegment AND one of these tokens (case-insensitive, ';' separated).
VoiceTokens=voice_hash;voice_package_list
